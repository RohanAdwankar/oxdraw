name: Deploy GitHub Pages

on:
  push:
    branches:
      - master 
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.105

      - name: Build Rust wasm library
        run: cargo build --target wasm32-unknown-unknown --release --no-default-features --lib

      - name: Generate wasm web bindings
        run: wasm-bindgen target/wasm32-unknown-unknown/release/oxdraw.wasm --target web --out-dir frontend/public --out-name oxdraw_wasm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci --prefix frontend

      - name: Build static frontend (local wasm mode)
        run: NEXT_PUBLIC_OXDRAW_MODE=local NEXT_PUBLIC_BASE_PATH=/oxdraw npm run --prefix frontend build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
